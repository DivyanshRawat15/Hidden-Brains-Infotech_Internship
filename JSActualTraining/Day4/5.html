<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day4 JS 5</title>
</head>
<body>
  <h1>
    Perform form validation using pure JavaScript (without jQuery Validate plugin).The form must include:
    <ul><li>Text input</li>
    <li>Select box</li>
    <li>Checkbox</li>
    <li>Radio button</li></ul>
    (Validate using JavaScript event handling and custom validation logic.)
  </h1>
  <form id="myForm">

    <label for="name">Name:</label>
    <input type="text" id="name">
    <br><br>

    <label for="city">City:</label>
    <select id="city">
        <option value="">-- Select City --</option>
        <option value="Mumbai">Mumbai</option>
        <option value="Delhi">Delhi</option>
        <option value="Ahmedabad">Ahmedabad</option>
    </select>
    <br><br>

    <label for="gender">Gender:</label>
    <input type="radio" name="gender" value="Male"> Male
    <input type="radio" name="gender" value="Female"> Female
    <br><br>

    
    <label for="hobby">Hobbies:</label>
    <input type="checkbox" name="hobby" value="Music"> Music
    <input type="checkbox" name="hobby" value="Sports"> Sports
    <input type="checkbox" name="hobby" value="Reading"> Reading
    <br><br>

    <button type="submit">Submit</button>

    </form>

    <p id="message"></p>

    <script>
        document.getElementById("myForm").addEventListener("submit", function(e) {

        e.preventDefault(); // stop default form submission

        let name = document.getElementById("name").value.trim();
        let city = document.getElementById("city").value;
        let gender = document.querySelector("input[name='gender']:checked");
        let hobbies = document.querySelectorAll("input[name='hobby']:checked");

        let message = document.getElementById("message");
        message.className = "";
        message.innerHTML = "";

        // Custom Validation Logic

        if (name === "") {
            message.innerHTML = "Name cannot be empty.";
            message.className = "error";
            return;
        }

        if (!/^[a-zA-Z ]+$/.test(name)) {
            message.innerHTML = "Name must contain only letters.";
            message.className = "error";
            return;
        }

        if (city === "") {
            message.innerHTML = "Please select a city.";
            message.className = "error";
            return;
        }

        if (!gender) {
            message.innerHTML = "Please select your gender.";
            message.className = "error";
            return;
        }

        if (hobbies.length === 0) {
            message.innerHTML = "Select at least one hobby.";
            message.className = "error";
            return;
        }

        // If all validations pass
        message.innerHTML = "Form submitted successfully.";
        message.className = "success";

        });
    </script>
</body>
</html>
