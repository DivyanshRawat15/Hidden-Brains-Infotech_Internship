<!DOCTYPE html>
<html>
<head>
<title>Balloon Game</title>
<style>
body{ margin:0; overflow:hidden; }
.balloon{
    position:absolute;
    width:50px;
    height:70px;
    background:red;
    border-radius:50%;
}
.stick{
    position:absolute;
    width:300px;
    height:20px;
    background:red;
    top:0;
    left:300px;
}
#msg{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:40px;
    display:none;
}
</style>
</head>
<body>

<div class="stick" id="stick"></div>
<div id="msg">GAME OVER</div>

<script>

let balloons = [];
let running = true;

function createBalloon(){
    let b = document.createElement("div");
    b.className = "balloon";
    b.style.left = Math.random()* (window.innerWidth-50) + "px";
    b.style.top = window.innerHeight + "px";
    b.speed = Math.random()*3 + 1;
    document.body.appendChild(b);
    balloons.push(b);
}

function move(){

    if(!running) return;

    balloons.forEach(b=>{
        let top = parseFloat(b.style.top);
        b.style.top = top - b.speed + "px";

        let bRect = b.getBoundingClientRect();
        let sRect = document.getElementById("stick").getBoundingClientRect();

        if(!(bRect.right < sRect.left ||
             bRect.left > sRect.right ||
             bRect.bottom < sRect.top ||
             bRect.top > sRect.bottom)){
             running = false;
             document.getElementById("msg").style.display="block";
        }

        if(top < -100){
            b.style.top = window.innerHeight + "px";
        }
    });
}

for(let i=0;i<5;i++){
    createBalloon();
}

setInterval(move,20);

</script>

</body>
</html>
